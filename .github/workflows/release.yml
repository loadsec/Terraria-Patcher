name: Build and Release (Terraria Patcher)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build/upload (example: v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && !github.event.release.draft) }}
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag/version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
          else
            RAW_TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$RAW_TAG" ]]; then
            echo "Tag is required."
            exit 1
          fi

          if [[ "$RAW_TAG" != v* ]]; then
            TAG="v$RAW_TAG"
          else
            TAG="$RAW_TAG"
          fi

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"
          echo "Resolved version: $VERSION"

  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    needs: prepare
    env:
      MONO_REQUIRED_VERSION: "6."
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies (no postinstall scripts)
        run: pnpm install --ignore-scripts

      - name: Install Mono toolchain (Windows)
        shell: pwsh
        run: |
          choco install mono --version=6.12.0.206 --yes --no-progress
          $mono = Join-Path $env:ProgramFiles "Mono\bin\mono.exe"
          if (!(Test-Path $mono)) { throw "Mono binary not found at $mono" }
          & $mono --version

      - name: Validate tag version matches package version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ needs.prepare.outputs.version }}"
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          test "$PKG_VERSION" = "$TAG_VERSION"

      - name: Build patcher bridge (win-x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path resources/patcher-bridge -Force | Out-Null
          Get-ChildItem resources/patcher-bridge -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          dotnet publish src/main/bridge/TerrariaPatcherBridge.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -o resources/patcher-bridge

          Copy-Item resources/patcher-bridge/TerrariaPatcherBridge.exe resources/patcher-bridge/patcher-win.exe -Force
          Get-ChildItem resources/patcher-bridge -Force | Where-Object { $_.Name -ne 'patcher-win.exe' } | Remove-Item -Recurse -Force

      - name: Prepare bundled Mono toolchain (Windows)
        run: pnpm run prepare:mono

      - name: Build app bundle
        run: pnpm exec electron-vite build

      - name: Package app (Windows)
        run: pnpm exec electron-builder --win --publish never

      - name: Validate packaged bridge binary (Windows)
        shell: pwsh
        run: |
          $bridge = "dist/win-unpacked/resources/patcher-bridge/patcher-win.exe"
          if (!(Test-Path $bridge)) { throw "Missing packaged bridge binary: $bridge" }
          Write-Host "Packaged bridge binary found: $bridge"
          Get-FileHash $bridge | Format-List

          $mcs = "dist/win-unpacked/resources/patcher-resources/plugins/.PluginLoaderTools/mono/lib/mono/4.5/mcs.exe"
          if (!(Test-Path $mcs)) { throw "Missing packaged Mono mcs toolchain: $mcs" }
          Write-Host "Packaged Mono toolchain found: $mcs"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files-windows
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap

  build-linux:
    name: Build Linux release
    runs-on: ubuntu-22.04
    needs: prepare
    env:
      MONO_REQUIRED_VERSION: "6.12."
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies (no postinstall scripts)
        run: pnpm install --ignore-scripts

      - name: Install Mono toolchain (Linux)
        shell: bash
        run: |
          sudo rm -f /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt-get install -y ca-certificates gnupg
          sudo gpg --homedir /tmp --no-default-keyring \
            --keyring gnupg-ring:/usr/share/keyrings/mono-official-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          sudo chmod +r /usr/share/keyrings/mono-official-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/mono-official-archive-keyring.gpg] https://download.mono-project.com/repo/ubuntu stable-focal main" \
            | sudo tee /etc/apt/sources.list.d/mono-official-stable.list
          sudo apt-get update
          sudo apt-get install -y mono-devel
          mono --version

      - name: Validate tag version matches package version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ needs.prepare.outputs.version }}"
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          test "$PKG_VERSION" = "$TAG_VERSION"

      - name: Build patcher bridge (linux-musl-x64)
        shell: bash
        run: |
          mkdir -p resources/patcher-bridge
          find resources/patcher-bridge -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          dotnet publish src/main/bridge/TerrariaPatcherBridge.csproj \
            -c Release \
            -r linux-musl-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=None \
            -o resources/patcher-bridge

          cp resources/patcher-bridge/TerrariaPatcherBridge resources/patcher-bridge/patcher-linux
          chmod +x resources/patcher-bridge/patcher-linux
          find resources/patcher-bridge -mindepth 1 -maxdepth 1 ! -name patcher-linux -exec rm -rf {} +

      - name: Prepare bundled Mono toolchain (Linux)
        run: pnpm run prepare:mono

      - name: Build app bundle
        run: pnpm exec electron-vite build

      - name: Package app (Linux)
        run: pnpm exec electron-builder --linux --publish never

      - name: Validate packaged bridge binary (Linux)
        shell: bash
        run: |
          test -f "dist/linux-unpacked/resources/patcher-bridge/patcher-linux"
          ls -lah "dist/linux-unpacked/resources/patcher-bridge/patcher-linux"
          test -f "dist/linux-unpacked/resources/patcher-resources/plugins/.PluginLoaderTools/mono/lib/mono/4.5/mcs.exe"
          ls -lah "dist/linux-unpacked/resources/patcher-resources/plugins/.PluginLoaderTools/mono/lib/mono/4.5/mcs.exe"
          test -f "dist/linux-unpacked/resources/patcher-resources/plugins/.PluginLoaderTools/mono/lib/libSystem.Native.so"
          ls -lah "dist/linux-unpacked/resources/patcher-resources/plugins/.PluginLoaderTools/mono/lib/libSystem.Native.so"
          nm -D "dist/linux-unpacked/resources/patcher-resources/plugins/.PluginLoaderTools/mono/lib/libSystem.Native.so" | grep -q "SystemNative_Stat2"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files-linux
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap

  build-macos:
    name: Build macOS release
    runs-on: macos-latest
    needs: prepare
    env:
      MONO_REQUIRED_VERSION: "6."
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies (no postinstall scripts)
        run: pnpm install --ignore-scripts

      - name: Install Mono toolchain (macOS)
        shell: bash
        run: |
          brew update
          brew install mono
          mono --version

      - name: Validate tag version matches package version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ needs.prepare.outputs.version }}"
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          test "$PKG_VERSION" = "$TAG_VERSION"

      - name: Resolve macOS runtime identifier
        id: mac_rid
        shell: bash
        run: |
          ARCH="$(uname -m)"
          if [[ "$ARCH" == "arm64" ]]; then
            RID="osx-arm64"
          else
            RID="osx-x64"
          fi
          echo "rid=$RID" >> "$GITHUB_OUTPUT"
          echo "Using RID: $RID"

      - name: Build patcher bridge (macOS)
        shell: bash
        run: |
          mkdir -p resources/patcher-bridge
          find resources/patcher-bridge -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          dotnet publish src/main/bridge/TerrariaPatcherBridge.csproj \
            -c Release \
            -r "${{ steps.mac_rid.outputs.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=None \
            -o resources/patcher-bridge

          cp resources/patcher-bridge/TerrariaPatcherBridge resources/patcher-bridge/patcher-mac
          chmod +x resources/patcher-bridge/patcher-mac
          find resources/patcher-bridge -mindepth 1 -maxdepth 1 ! -name patcher-mac -exec rm -rf {} +

      - name: Prepare bundled Mono toolchain (macOS)
        run: pnpm run prepare:mono

      - name: Build app bundle
        run: pnpm exec electron-vite build

      - name: Package app (macOS)
        run: pnpm exec electron-builder --mac --publish never

      - name: Validate packaged bridge binary (macOS)
        shell: bash
        run: |
          MATCH="$(find dist -type f -path "*/patcher-bridge/patcher-mac" | head -n 1)"
          if [[ -z "$MATCH" ]]; then
            echo "Missing packaged bridge binary under patcher-bridge/patcher-mac"
            exit 1
          fi
          ls -lah "$MATCH"

          MCS_MATCH="$(find dist -type f -path "*/patcher-resources/plugins/.PluginLoaderTools/mono/lib/mono/4.5/mcs.exe" | head -n 1)"
          if [[ -z "$MCS_MATCH" ]]; then
            echo "Missing packaged Mono toolchain mcs.exe"
            exit 1
          fi
          ls -lah "$MCS_MATCH"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files-macos
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap

  release-assets:
    name: Publish release assets + checksums
    runs-on: ubuntu-latest
    needs: [prepare, build-windows, build-linux, build-macos]
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-files-*
          merge-multiple: true
          path: release-files

      - name: List files
        shell: bash
        run: ls -lah release-files

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-files
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            release-files/*
          overwrite_files: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
